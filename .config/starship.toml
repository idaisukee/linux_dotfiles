format = """
[](bg:blue fg:white)\
$username\
$directory\
$git_branch\
$git_status\
$time\
[🭡](bg:none fg:bright-black)
> 
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
palette = 'ieremii'

[palettes.ieremii]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
style_user = "bg:color_aqua fg:color_fg0"
style_root = "bg:#9A348E"
format = '[ $user 🭅]($style)'
disabled = false

[directory]
style = "bg:color_fg0 fg:color_blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:color_blue fg:color_green"
format = '[🭐  $symbol $branch  🭅]($style)'

[git_status]
style = "bg:color_green fg:color_blue"
format = '[ $all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:color_blue fg:color_aqua"
format = '[🭐 $time ]($style)'
