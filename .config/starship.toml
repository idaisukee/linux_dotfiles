format = """
[Óāľ](bg:blue fg:white)\
[$username Óāļ](bg:color_0 fg:color_1)\
[$directory Óāļ](bg:color_1 fg:color_2)\
[$git_branch Óāļ](bg:color_2 fg:color_1)\
[$git_status Óāļ](bg:color_1 fg:color_2)\
[$time Óāļ](bg:color_2 fg:color_1)\
[  ](bg:color_1 fg:color_0)
> 
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
palette = 'ieremii'

[palettes.ieremii]
color_0 = 'blue'
color_1 = 'white'
color_2 = 'yellow'
color_3 = 'black'

[username]
show_always = true
style_user = "bg:color_0 fg:color_1"
style_root = "bg:#9A348E"
format = '[ $user](none)'
disabled = false

[directory]
format = "[ $path](none)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
format = '[ $symbol $branch](none)'

[git_status]
format = '[ $all_status$ahead_behind](none)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
format = '[ $time](none)'
