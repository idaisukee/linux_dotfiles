[mgr]
cwd = { bg = "white", fg = "green" }
find_keyword = { fg = "yellow", bold = true, italic = true, underline = true }
find_position = { fg = "magenta", bg = "reset", bold = true, italic = true }
symlink_target = { underline = true, fg = "yellow" }
marker_copied = { fg = "green", bg = "green" }
marker_cut = { fg = "red", bg = "red" }
marker_marked = { fg = "magenta", bg = "magenta" }
marker_selected = { fg = "yellow", bg = "yellow" }
count_copied = { fg = "black", bg = "green" }
count_cut = { fg = "black", bg = "red" }
count_selected = { fg = "black", bg = "yellow" }
border_symbol = "│"
border_style = { fg = "bright-black" }

[tabs]
active = { fg = "black", bg = "white", bold = true }
inactive = { fg = "cyan", bg = "black" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "white", bg = "cyan", bold = true }
normal_alt = { fg = "white", bg = "bright-blue" }
select_main = { fg = "white", bg = "magenta", bold = true }
select_alt = { fg = "magenta", bg = "black" }
unset_main = { fg = "black", bg = "red", bold = true }
unset_alt = { fg = "red", bg = "black" }

[indicator]
parent = { underline = true, bg = "white", fg = "bright-blue" }
current = { bg = "bright-blue", fg = "white" }
preview = { underline = true, fg = "white" }
padding = { open = "█", close = "█" }

[status]
overall = { bg = "cyan" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_sep = { fg = "white" }
perm_type = { bg = "white", fg = "green" }
perm_read = { bg = "white", fg = "green" }
perm_write = { bg = "white", fg = "green" }
perm_exec = { bg = "white", fg = "green" }
progress_label = { fg = "white", bold = true }
progress_normal = { fg = "magenta", bg = "black" }
progress_error = { fg = "black", bg = "red" }

[which]
cols = 3
mask = { bg = "black" }
cand = { fg = "cyan", bold = true }
rest = { fg = "blue" }
desc = { fg = "blue", italic = true }
separator = "  "
separator_style = { fg = "blue" }

[confirm]
border = { fg = "cyan", bold = true }
title = { fg = "cyan" }
body = { fg = "blue" }
list = { fg = "white" }
btn_yes = { fg = "white", bg = "black", bold = true }
btn_no = { fg = "white" }
btn_labels = ["  [Y]es  ", "  (N)o  "]

[spot]
border = { fg = "cyan", bold = true }
title = { fg = "white" }
tbl_col = { fg = "blue" }
tbl_cell = { fg = "cyan", bg = "black", bold = true }

[notify]
title_info = { fg = "green" }
title_warn = { fg = "yellow" }
title_error = { fg = "red" }
icon_info = ""
icon_warn = ""
icon_error = ""

[pick]
border = { fg = "cyan", bold = true }
active = { fg = "white", bold = true }
inactive = { fg = "blue" }

[input]
border = { fg = "bright-blue", bold = true }
title = { fg = "white" }
value = { bg = "blue", fg = "white" }
selected = { reversed = true }

[cmp]
border = { fg = "cyan", bold = true }
active = { reversed = true }
inactive = {}

[tasks]
border = { fg = "cyan", bold = true }
title = { fg = "cyan" }
hovered = { fg = "magenta", bold = true }

[help]
on = { fg = "cyan" }
run = { fg = "magenta" }
desc = { fg = "blue" }
hovered = { bg = "black", bold = true }
footer = { fg = "white", bg = "black" }

[filetype]
rules = [  
  { mime = "image/*", fg = "cyan" },
  { mime = "video/*", fg = "yellow" },
  { mime = "audio/*", fg = "yellow" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "magenta" },
  { mime = "application/{pdf,doc,rtf}", fg = "green" },
  { mime = "vfs/{absent,stale}", fg = "blue" },
  { url = "*", is = "orphan", bg = "red" },
  { url = "*", is = "exec", fg = "green" },
  { url = "*", is = "link", bg = "red", fg = "blue" },
  { url = "*", is = "dummy", bg = "red" },
  { url = "*/", is = "dummy", bg = "red" },
  { url = "*/", bg = "bright-black", fg = "white" },
]